<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
</head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<link rel="stylesheet" href="style.css">

<body>
    <div class="main">
        <div class="weather-animation" id="weather-animation"></div>
        <div class="container">
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Fetching Weather...</p>
            </div>
            <div class="error-message" id="error-message">
                <i class="fa-solid fa-circle-exclamation"></i>

                <h2>City Not Found</h2>

                <p>Please enter a valid city name.</p>
            </div>
            <div class="search-section">
                <input type="text" id="city-input" class="city-input" placeholder="Enter city name">
                <button class="search-btn" id="search-btn">
                    <i class="fa-solid fa-magnifying-glass"></i>

                </button>
                <button class="location-btn" id="location-btn">
                    <i class="fa-solid fa-location-crosshairs"></i>
                </button>
            </div>
            <div class="weather">
                <img src="assets/CLOUD.png" alt="cloud" class="weather-icon" id="weather-icon">
                <h1 class="temperature" id="temperature">25°C</h1>
                <h2 class="city-name" id="city-name">New York</h2>
                <p class="weather-status" id="weather-status">Cloudy</p>
                <div class="day-night-indicator" id="day-night-indicator">
                    ☀️ Day
                </div>
            </div>
            <div class="details">

                <div class="detail-card">

                    <img src="assets/humidity.png" alt="Humidity">

                    <div class="detail-text">
                        <h3 class="humidity-value" id="humidity-value">82%</h3>
                        <p>Humidity</p>
                    </div>

                </div>

                <div class="detail-card">

                    <img src="assets/wind.png" alt="Wind">

                    <div class="detail-text">
                        <h3 class="wind-value" id="wind-value">12 km/h</h3>
                        <p>Wind Speed</p>
                    </div>

                </div>

            </div>
            <div class="sun-section">

                <div class="sun-card">
                    <i class="fa-solid fa-sun"></i>

                    <div>
                        <h3 id="sunrise-time">--:--</h3>
                        <p>Sunrise</p>
                    </div>
                </div>

                <div class="sun-card">
                    <i class="fa-solid fa-moon"></i>

                    <div>
                        <h3 id="sunset-time">--:--</h3>
                        <p>Sunset</p>
                    </div>
                </div>

            </div>
            <div class="weather-tip">
                💡 <span id="weather-tip">Search a city to get weather tips.</span>
            </div>
            <div class="forecast">
                <h1>5-Day Forecast</h1>
                <div class="forecast-container" id="forecast-container">
                    <!-- Forecast cards will be dynamically added here -->

                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>>
